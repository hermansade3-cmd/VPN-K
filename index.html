// ─── Helpers ────────────────────────────────────────────────────────────────
function timeStr(d) {
  if (!d) return now();
  try { return new Date(d).toLocaleTimeString("sw-TZ", { hour: "2-digit", minute: "2-digit" }); }
  catch { return now(); }
}
function now() {
  return new Date().toLocaleTimeString("sw-TZ", { hour: "2-digit", minute: "2-digit" });
}

// Funguo ya mazungumzo - imara kati ya akaunti mbili, isiyojali mpangilio
function convoId(emailA, emailB) {
  const a = emailA.trim().toLowerCase();
  const b = emailB.trim().toLowerCase();
  return [a, b].sort().join("__").replace(/[^a-zA-Z0-9_@.]/g, "_");
}

// ─── Firebase Auth REST helpers (email + password) ──────────────────────────
async function firebaseSignUp(email, password) {
  const res = await fetch(FIREBASE_SIGNUP_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, returnSecureToken: true }),
  });
  const data = await res.json();
  if (data.error) throw new Error(mapFirebaseError(data.error.message));
  return data; // { idToken, email, localId, refreshToken, ... }
}

async function firebaseSignIn(email, password) {

  });
  const data = await res.json();
  if (data.error) throw new Error(mapFirebaseError(data.error.message));
  return data;
}

const FIREBASE_REFRESH_URL = `https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}`;

async function firebaseRefreshIdToken(refreshToken) {
  const res = await fetch(FIREBASE_REFRESH_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshToken)}`,
  });
  const data = await res.json();
  if (data.error) {
    const msg = data.error.message
      || (data.error.errors && data.error.errors[0] && data.error.errors[0].message)
      || "Kikao kimeisha muda";
    throw new Error(mapFirebaseError(msg));
  }
  return data; // { id_token, refresh_token, user_id, expires_in, ... }
}

// ─── Kuhifadhi kikao (auto-login) ────────────────────────────────────────────
// Tunajaribu kutumia "window.storage" (inayotolewa ndani ya Claude artifact).
// Kama haipo - mfano ukifungua faili hili moja kwa moja kwenye kivinjari chako
// au baada ya kuliweka kwenye server yako mwenyewe - tunarudi localStorage ya
// kawaida ili kikao kiendelee kuhifadhiwa popote unapofungua app hii.
const SESSION_KEY = "gmailchat_session";

async function saveSession(session) {
  const json = JSON.stringify(session);
  try {
    if (window.storage) { await window.storage.set(SESSION_KEY, json, false); return; }
  } catch (e) {}
  try { localStorage.setItem(SESSION_KEY, json); } catch (e) {}
}

async function loadSession() {
  try {
    if (window.storage) {
      const r = await window.storage.get(SESSION_KEY, false);
      return r && r.value ? JSON.parse(r.value) : null;
    }
  } catch (e) {}
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

async function clearSession() {
  try { if (window.storage) await window.storage.delete(SESSION_KEY, false); } catch (e) {}
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
}

// Tumia herufi za nafasi (storage) za window.storage moja kwa moja kwa
// idadi ya nafasi inayotumika (storage usage estimate) - tunakokotoa kwa
// kupima ukubwa wa JSON ya session + settings + cache ya chats kwenye
// localStorage (kadirio pekee, si hesabu kamili ya server).
function estimateStorageUsageKB() {
  let total = 0;
  try {
    for (const k in localStorage) {
      if (!Object.prototype.hasOwnProperty.call(localStorage, k)) continue;
      total += (localStorage[k] || "").length + k.length;
    }
  } catch (e) {}
  return (total / 1024).toFixed(1);
}

// ─── Firestore REST helpers ─────────────────────────────────────────────────
// Tunatumia Firestore "structured" document format moja kwa moja kupitia REST,
// kwa kuwa hatutumii firebase SDK.

function toFirestoreValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "number") return { integerValue: String(Math.trunc(v)) };
  if (typeof v === "boolean") return { booleanValue: v };
  return { stringValue: String(v) };
}

function fromFirestoreFields(fields) {
  const out = {};
  for (const k in fields || {}) {
    const v = fields[k];
    if ("stringValue" in v) out[k] = v.stringValue;
    else if ("integerValue" in v) out[k] = Number(v.integerValue);
    else if ("doubleValue" in v) out[k] = v.doubleValue;
    else if ("booleanValue" in v) out[k] = v.booleanValue;
    else if ("nullValue" in v) out[k] = null;
    else out[k] = null;
  }
  return out;
}

// Hifadhi/sasisha taarifa za mtumiaji kwenye users/{uid} - inahitajika ili
// watu wengine waweze kuona jina lako wakati wanachati nawe.
async function firestoreUpsertUser(idToken, uid, profile) {
  const url = `${FIRESTORE_BASE}/users/${uid}`;
  const fields = {};
  for (const k in profile) fields[k] = toFirestoreValue(profile[k]);
  await fetch(url, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify({ fields }),
  });
}

// Tafuta mtumiaji kwa barua pepe (huhitaji rule inayoruhusu "list" salama,
// kwa hiyo tunatumia query iliyofungwa na barua pepe halisi).
async function firestoreFindUserByEmail(idToken, email) {
  const url = `${FIRESTORE_BASE}:runQuery`;
  const body = {
    structuredQuery: {
      from: [{ collectionId: "users" }],
      where: {
        fieldFilter: {
          field: { fieldPath: "email" },
          op: "EQUAL",
          value: { stringValue: email.trim().toLowerCase() },
        },
      },
      limit: 1,
    },
  };
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  const row = Array.isArray(data) ? data.find(r => r.document) : null;
  if (!row) return null;
  const fields = fromFirestoreFields(row.document.fields);
  const name = row.document.name || "";
  const uid = name.split("/").pop();
  return { uid, ...fields };
}

// Tuma ujumbe mpya kwenye mazungumzo (conversations/{convoId}/messages)
async function firestoreSendMessage(idToken, cid, msg) {
  const url = `${FIRESTORE_BASE}/conversations/${cid}/messages`;
  const fields = {};
  for (const k in msg) fields[k] = toFirestoreValue(msg[k]);
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify({ fields }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Imeshindwa kutuma ujumbe");
  return data;
}

// Pata ujumbe wote wa mazungumzo fulani, kwa mpangilio wa muda.
// MUHIMU: query ya subcollection lazima ielekezwe kwenye njia ya document
// mzazi (conversations/{cid}), si kwenye mzizi wa "documents" pekee - hapo
// ndipo kosa la zamani lilikuwa, na ndiyo sababu ujumbe haukuonekana kabisa.
async function firestoreGetMessages(idToken, cid) {
  const url = `${FIRESTORE_BASE}/conversations/${cid}:runQuery`;
  const body = {
    structuredQuery: {
      from: [{ collectionId: "messages" }],
      orderBy: [{ field: { fieldPath: "ts" }, direction: "ASCENDING" }],
    },
  };
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!Array.isArray(data)) return [];
  return data
    .filter(r => r.document)
    .map(r => {
      const f = fromFirestoreFields(r.document.fields);
      const id = r.document.name.split("/").pop();
      return { id, ...f };
    });
}

// Pata document moja kwa njia yake kamili (mfano: "conversations/{cid}")
async function firestoreGetDocument(idToken, path) {
  const res = await fetch(`${FIRESTORE_BASE}/${path}`, {
    headers: { Authorization: `Bearer ${idToken}` },
  });
  if (!res.ok) return null;
  const data = await res.json();
  if (!data.fields) return null;
  return fromFirestoreFields(data.fields);
}

// Sasisha sehemu (fields) maalum tu za document, bila kugusa sehemu nyingine -
// tunatumia hii kuweka hesabu ya "ujumbe haujasomwa" kuwa 0 wakati mtu anafungua chat.
async function firestorePatchFields(idToken, path, data) {
  const fields = {};
  for (const k in data) fields[k] = toFirestoreValue(data[k]);
  const mask = Object.keys(data).map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join("&");
  await fetch(`${FIRESTORE_BASE}/${path}?${mask}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify({ fields }),
  });
}

// Sasisha "metadata" ya mazungumzo (conversations/{cid}) - documenti moja
// inayoshirikiwa na pande zote mbili, ina barua pepe za washiriki wawili
// (p1Email, p2Email) ili kila upande aweze kuitafuta kwa query salama.
async function firestoreUpsertConversation(idToken, cid, data) {
  const fields = {};
  for (const k in data) fields[k] = toFirestoreValue(data[k]);
  // Jaribu kuunda; kama tayari ipo, sasisha kwa PATCH badala yake.
  let res = await fetch(`${FIRESTORE_BASE}/conversations?documentId=${cid}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${idToken}`,
    },
    body: JSON.stringify({ fields }),
  });
  if (!res.ok) {
    res = await fetch(`${FIRESTORE_BASE}/conversations/${cid}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${idToken}`,
      },
      body: JSON.stringify({ fields }),
    });
  }
  return res.json();
}

// Pata mazungumzo yote ambapo barua pepe yangu ni p1Email AU p2Email.
async function firestoreGetConversationsFor(idToken, email) {
  async function queryField(field) {
    const body = {
      structuredQuery: {
        from: [{ collectionId: "conversations" }],
        where: {
          fieldFilter: {
            field: { fieldPath: field },
            op: "EQUAL",
            value: { stringValue: email },
          },
        },
      },
    };
    const res = await fetch(`${FIRESTORE_BASE}:runQuery`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${idToken}`,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data
      .filter(r => r.document)
      .map(r => {
        const f = fromFirestoreFields(r.document.fields);
        const id = r.document.name.split("/").pop();
        return { id, ...f };
      });
  }
  const [a, b] = await Promise.all([queryField("p1Email"), queryField("p2Email")]);
  const merged = [...a, ...b];
  const seen = new Set();
  return merged.filter(c => (seen.has(c.id) ? false : (seen.add(c.id), true)));
}

function applyTheme(settings) {
  const theme = CHAT_THEMES[settings.chatTheme] || CHAT_THEMES.teal;
  if (settings.darkMode) {
    S.bg = "#121A1E";
    S.white = "#1C262B";
    S.text = settings.highContrast ? "#FFFFFF" : "#EDEDED";
    S.sub = settings.highContrast ? "#DDDDDD" : "#9AA5A8";
    S.border = "rgba(255,255,255,0.10)";
    S.input = "#15201F";
    S.bubbleOut = theme.greenDark;
    S.bubbleIn = "#22302F";
    S.chatBg = "#0E1517";
  } else {
    S.bg = "#F0EBE1";
    S.white = "#FFFFFF";
    S.text = settings.highContrast ? "#000000" : "#1A1A1A";
    S.sub = settings.highContrast ? "#222222" : "#666666";
    S.border = "rgba(0,0,0,0.08)";
    S.input = "#F5F5F5";
    S.bubbleOut = "#DCF8C6";
    S.bubbleIn = "#FFFFFF";
    S.chatBg = "#ECE5DD";
  }
  S.green = theme.green;
  S.greenDark = theme.greenDark;
  S.red = "#E53935";
  S.fontFamily = FONT_FAMILIES[settings.fontStyle] || FONT_FAMILIES.inter;
  S.baseFontSize = (FONT_SIZES[settings.fontSize] || FONT_SIZES.medium) + (settings.largeTapTargets ? 1 : 0);
}

// Soma maandishi kwa sauti (Text-to-Speech) - kipengele cha Accessibility.
function speakText(text) {
  try {
    if (!("speechSynthesis" in window) || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "sw-TZ";
    u.rate = 0.98;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

  function fmtTime(s) {
    const h = String(Math.floor(s / 3600)).padStart(2, "0");
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
    const sc = String(s % 60).padStart(2, "0");
    return `${h}:${m}:${sc}`;
  }
  function fmtData(mb) {
    return mb < 1000 ? `${mb.toFixed(1)} MB` : `${(mb / 1024).toFixed(2)} GB`;
  }

  function handleConnect() {
    if (connected) {
      clearInterval(timerRef.current);
      setConnected(false); setSeconds(0); setDataDown(0); setDataUp(0);
      return;
    }
    setConnecting(true);
    setTimeout(() => {
      setConnecting(false); setConnected(true);
      timerRef.current = setInterval(() => {
        setSeconds(s => s + 1);
        setDataDown(d => d + Math.random() * 0.8);
        setDataUp(u => u + Math.random() * 0.2);

function SettingsScreen({ settings, updateSettings, onBack, showToast, user }) {
  const [pinModal, setPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [blockInput, setBlockInput] = useState("");
  const [favInput, setFavInput] = useState("");
  const [newQuickReply, setNewQuickReply] = useState("");

  function setPin() {
    if (pinInput.trim().length < 4) { showToast("PIN lazima iwe na angalau tarakimu 4"); return; }
    updateSettings({ appLockEnabled: true, appLockPin: pinInput.trim() });
    setPinModal(false); setPinInput("");
    showToast("Ufunguo wa PIN umewekwa ✓");
  }

  function disableLock() {
    updateSettings({ appLockEnabled: false, appLockPin: "" });
    showToast("App Lock imezimwa");
  }

  function addBlocked() {
    const e = blockInput.trim().toLowerCase();
    if (!e || !e.includes("@")) { showToast("Weka barua pepe sahihi"); return; }
    if (settings.blockedEmails.includes(e)) { showToast("Tayari imezuiwa"); return; }
    updateSettings({ blockedEmails: [...settings.blockedEmails, e] });
    setBlockInput("");
  }

  function removeBlocked(e) {
    updateSettings({ blockedEmails: settings.blockedEmails.filter(x => x !== e) });
  }

  function addFavorite() {
    const e = favInput.trim().toLowerCase();
    if (!e || !e.includes("@")) { showToast("Weka barua pepe sahihi"); return; }
    if (settings.favoriteEmails.includes(e)) { showToast("Tayari kwenye vipendwa"); return; }
    updateSettings({ favoriteEmails: [...settings.favoriteEmails, e] });
    setFavInput("");
  }

  function removeFavorite(e) {
    updateSettings({ favoriteEmails: settings.favoriteEmails.filter(x => x !== e) });
  }

  function addQuickReply() {
    const t = newQuickReply.trim();
    if (!t) return;
    updateSettings({ quickReplies: [...settings.quickReplies, t] });
    setNewQuickReply("");
  }

  function removeQuickReply(i) {
    updateSettings({ quickReplies: settings.quickReplies.filter((_, idx) => idx !== i) });
  }

  async function doExportSMS() {
    try {
      const data = {
        exportedAt: new Date().toISOString(),
        user: user?.email || null,
        settings,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `vpnk-backup-${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Faili la backup limepakuliwa ✓");
    } catch (e) {
      showToast("Imeshindwa kuhamisha data ✗");
    }
  }

  function doClearCache() {
    try {
      const keep = {};
      [SESSION_KEY, SETTINGS_KEY].forEach(k => { if (localStorage.getItem(k) != null) keep[k] = localStorage.getItem(k); });
      localStorage.clear();
      Object.keys(keep).forEach(k => localStorage.setItem(k, keep[k]));
      showToast("Cache imefutwa ✓");
    } catch (e) {
      showToast("Imeshindwa kufuta cache");
    }
  }

  function doDeleteAllMessages() {
    if (!window.confirm("Una hakika? Hatua hii itaficha mazungumzo YOTE kwenye orodha yako ya inbox (hapa kwenye kifaa hiki). Haiwezi kurudishwa kirahisi.")) return;
    showToast("Tumia 'Futa SMS zote' kwa tahadhari - kipengele hiki bado ni cha onyo pekee kwa sasa.");
  }

  const usageKB = estimateStorageUsageKB();

  return (
    <>
      <SettingsHeader title="⚙️ Mipangilio" onBack={onBack} />
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "16px 14px 40px", background: S.bg }}>

        {/* 1. ARIFA */}
        <SettingsSection icon="🔔" title="Arifa (Notifications)" subtitle="Dhibiti jinsi unavyopokea arifa za ujumbe">
          <SettingsRow label="Arifa za ujumbe mpya" desc="Pokea arifa kila ujumbe mpya unapofika"
            right={<Toggle checked={settings.notifNewMessage} onChange={v => updateSettings({ notifNewMessage: v })} />} />
          <SettingsRow label="Sauti ya ujumbe" desc="Cheza sauti wakati ujumbe unapofika"
            right={<Toggle checked={settings.notifSound} onChange={v => updateSettings({ notifSound: v })} />} />
          <SettingsRow label="Mtetemo (Vibration)" desc="Tetemesha kifaa wakati wa arifa"
            right={<Toggle checked={settings.notifVibration} onChange={v => updateSettings({ notifVibration: v })} />} />
          <SettingsRow label="Taa ya arifa (LED)" desc="Washa taa ya arifa kwenye vifaa vinavyosaidia" last
            right={<Toggle checked={settings.notifLed} onChange={v => updateSettings({ notifLed: v })} />} />
        </SettingsSection>

        {/* 2. MUONEKANO */}
        <SettingsSection icon="🎨" title="Muonekano (Appearance)" subtitle="Badilisha jinsi VPN K inavyoonekana">
          <SettingsRow label="Dark Mode" desc="Tumia muonekano wa giza kwenye app nzima"
            right={<Toggle checked={settings.darkMode} onChange={v => updateSettings({ darkMode: v })} />} />
          <SettingsRow label="Ukubwa wa maandishi" desc="Chagua ukubwa wa herufi kwenye mazungumzo"
            right={<SettingsSelect value={settings.fontSize} onChange={v => updateSettings({ fontSize: v })}
              options={[{ value: "small", label: "Ndogo" }, { value: "medium", label: "Wastani" }, { value: "large", label: "Kubwa" }, { value: "xlarge", label: "Kubwa Zaidi" }]} />} />

function App() {
  const [user, setUser] = useState(null);          // { uid, name, email, token }
  const [checkingSession, setCheckingSession] = useState(true);
  const [loginBusy, setLoginBusy] = useState(false);
  const [loginError, setLoginError] = useState("");
  const [authMode, setAuthMode] = useState("login"); // login | signup

  const [appScreen, setAppScreen] = useState("vpn"); // vpn | login | chat
  const [view, setView] = useState("inbox");        // inbox | chat | newChat | settings | ai
  const [contacts, setContacts] = useState([]);
  const [active, setActive] = useState(null);
  const [chats, setChats] = useState({});
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [toast, setToast] = useState("");
  const [ncEmail, setNcEmail] = useState("");
  const [ncMsg, setNcMsg] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);
  const endRef = useRef(null);
  const pollRef = useRef(null);
  const inboxPollRef = useRef(null);

  // ── Settings ──
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [settingsLoaded, setSettingsLoaded] = useState(false);
  const [themeTick, setThemeTick] = useState(0); // inalazimisha re-render baada ya applyTheme()
  const [appLocked, setAppLocked] = useState(false);
  const [pinAttempt, setPinAttempt] = useState("");
  const [pinError, setPinError] = useState("");

  useEffect(() => {
    (async () => {
      const s = await loadSettings();
      setSettings(s);
      applyTheme(s);
      setAppLocked(!!(s.appLockEnabled && s.appLockPin));
      setSettingsLoaded(true);
      setThemeTick(t => t + 1);
    })();
  }, []);

  async function updateSettings(patch) {
    setSettings(prev => {
      const next = { ...prev, ...patch };
      applyTheme(next);
      saveSettings(next);
      setThemeTick(t => t + 1);
      return next;
    });
  }

  function unlockApp(pin) {
    if (pin === settings.appLockPin) {
      setAppLocked(false);
      setPinError("");
      setPinAttempt("");
    } else {
      setPinError("PIN si sahihi. Jaribu tena.");
    }
  }

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chats, active]);

  // Mara app inapofunguka, angalia kama kuna kikao kilichohifadhiwa awali -
  // kama kipo na bado ni sahihi, mtumiaji anaingia automatically bila form.
  useEffect(() => {
    (async () => {
      const saved = await loadSession();
      if (saved && saved.refreshToken) {
        try {
          const r = await firebaseRefreshIdToken(saved.refreshToken);
          const restoredUser = {
            uid: r.user_id,
            name: saved.name,
            email: saved.email,
            token: r.id_token,
          };
          setUser(restoredUser);
          await saveSession({ uid: restoredUser.uid, name: restoredUser.name, email: restoredUser.email, refreshToken: r.refresh_token });
          setAppScreen("chat");
          loadThreads(restoredUser);
        } catch (e) {
          await clearSession();
        }
      }
      setCheckingSession(false);
    })();
  }, []);

  function showToast(msg, ms = 3000) {
    setToast(msg);
    setTimeout(() => setToast(""), ms);
  }

  // ── Login / Jisajili (Firebase Auth REST API) ──
  async function handleAuthSubmit({ email, password, name }) {
    if (!email || !password) {
      setLoginError("Jaza barua pepe na nenosiri.");
      return;
    }
    setLoginBusy(true);
    setLoginError("");
    try {
      const fbResult = authMode === "signup"
        ? await firebaseSignUp(email, password)
        : await firebaseSignIn(email, password);

      const cleanEmail = fbResult.email.trim().toLowerCase();
      const displayName = authMode === "signup"
        ? (name || cleanEmail.split("@")[0])
        : (name || cleanEmail.split("@")[0]);

      const newUser = {
        uid: fbResult.localId,
        name: displayName,
        email: cleanEmail,
        token: fbResult.idToken,
      };
      setUser(newUser);

      // Hifadhi kikao ili mtumiaji asiingie tena baadaye (auto-login).
      await saveSession({
        uid: newUser.uid,
        name: newUser.name,
        email: newUser.email,
        refreshToken: fbResult.refreshToken,
      });

      // Hifadhi/sasisha taarifa za mtumiaji kwenye Firestore ili wengine
      // waweze kumtafuta kwa barua pepe.
      await firestoreUpsertUser(newUser.token, newUser.uid, {
        name: displayName,
        email: cleanEmail,
      });

      showToast(`Karibu, ${displayName.split(" ")[0]}! ✓`);
      setAppScreen("chat");
      loadThreads(newUser);
    } catch (e) {
      setLoginError(e.message || "Imeshindwa. Jaribu tena.");
    }
    setLoginBusy(false);
  }

  function handleLogout() {
    if (pollRef.current) clearInterval(pollRef.current);
    if (inboxPollRef.current) clearInterval(inboxPollRef.current);
    clearSession();
    setUser(null);
    setContacts([]);
    setChats({});
    setActive(null);
    setView("inbox");
    if (settings.appLockEnabled) setAppLocked(true);
  }

  // ── Mazungumzo (Firestore) ──
  async function loadThreads(forUser, quiet) {
    const u = forUser || user;
    if (!u) return;
    if (!quiet) setBusy(true);
    try {
      const convos = await firestoreGetConversationsFor(u.token, u.email);
      const sorted = convos.sort((a, b) => (b.lastTs || 0) - (a.lastTs || 0));
      setContacts(sorted.map(c => {
        const isP1 = c.p1Email === u.email;
        const peerEmail = isP1 ? c.p2Email : c.p1Email;
        const peerName = isP1 ? c.p2Name : c.p1Name;
        const myUnread = isP1 ? (c.p1Unread || 0) : (c.p2Unread || 0);
        return {
          id: c.id,
          name: peerName || (peerEmail ? peerEmail.split("@")[0] : "Mgeni"),
          email: peerEmail || "",
          lastMsg: c.lastMsg || "",
          lastTime: c.lastTime || "",
          unread: myUnread,
        };
      }));
    } catch (e) {
      if (!quiet) showToast("Imeshindwa kupakia: " + e.message);
    }
    if (!quiet) setBusy(false);
  }

  async function openThread(contact) {
    setActive(contact);
    setView("chat");
    setBusy(true);
    // Ondoa alama ya ujumbe mpya papo hapo kwenye orodha (UI), kabla hata
    // ya kusubiri jibu la server.
    setContacts(cs => cs.map(c => c.id === contact.id ? { ...c, unread: 0 } : c));
    try {
      const msgs = await firestoreGetMessages(user.token, contact.id);
      setChats(c => ({
        ...c,
        [contact.id]: msgs.map(m => ({
          id: m.id,
          from: m.fromEmail === user.email ? "Wewe" : contact.name,
          text: m.text || "",
          time: m.tsLabel || now(),
          direction: m.fromEmail === user.email ? "out" : "in",
        })),
      }));
      // Sasisha kwenye Firestore pia, kwa "field" yangu pekee, ili
      // hesabu ya ujumbe mpya isirudi tena baada ya refresh.
      const sortedEmails = [user.email, contact.email].sort();
      const isUserP1 = sortedEmails[0] === user.email;
      const myField = isUserP1 ? "p1Unread" : "p2Unread";
      firestorePatchFields(user.token, `conversations/${contact.id}`, { [myField]: 0 }).catch(() => {});
    } catch (e) {
      showToast("Imeshindwa kupakia ujumbe: " + e.message);
    }
    setBusy(false);
  }

  async function sendMessageTo(peerEmail, peerName, text) {
    const cleanPeer = peerEmail.trim().toLowerCase();
    if (cleanPeer === user.email) throw new Error("Hauwezi kujitumia ujumbe wewe mwenyewe.");

    const peer = await firestoreFindUserByEmail(user.token, cleanPeer);
    if (!peer) {
      throw new Error("Hakuna mtumiaji aliyesajiliwa na barua pepe hiyo. Mwambie ajisajili VPN K kwanza.");
    }

    const cid = convoId(user.email, cleanPeer);
    // p1 = mwenye barua pepe ndogo kialfabeti, p2 = mwingine (uthabiti na convoId)
    const sortedEmails = [user.email, cleanPeer].sort();
    const isUserP1 = sortedEmails[0] === user.email;

    await firestoreSendMessage(user.token, cid, {
      fromEmail: user.email,
      fromName: user.name,
      toEmail: cleanPeer,
      text,
      ts: Date.now(),
      tsLabel: now(),
    });

    // Hesabu ya "ujumbe haujasomwa" - tunamuongezea mpokeaji 1, na kumuwekea
    // mtumaji 0 (kwa kuwa yeye yupo ndani ya mazungumzo hivi sasa).
    const existing = await firestoreGetDocument(user.token, `conversations/${cid}`);
    const recipientField = isUserP1 ? "p2Unread" : "p1Unread";
    const senderField = isUserP1 ? "p1Unread" : "p2Unread";
    const recipientCurrent = (existing && existing[recipientField]) || 0;

    // Hifadhi/sasisha metadata ya mazungumzo - hii ndiyo inayowezesha
    // pande zote mbili kuona thread hii kwenye inbox yao (query kwa email).
    await firestoreUpsertConversation(user.token, cid, {
      p1Email: sortedEmails[0],
      p2Email: sortedEmails[1],
      p1Name: isUserP1 ? user.name : (peer.name || peerName || cleanPeer.split("@")[0]),
      p2Name: isUserP1 ? (peer.name || peerName || cleanPeer.split("@")[0]) : user.name,
      lastTs: Date.now(),
      lastMsg: text.slice(0, 60),
      lastTime: now(),
      [recipientField]: recipientCurrent + 1,
      [senderField]: 0,
    });

    return cid;
  }

  async function sendReply() {
    if (!input.trim() || !active) return;
    if (settings.blockedEmails.includes(active.email)) {
      showToast("Umemzuia mtumiaji huyu. Fungua tena ufikiwe Mipangilio kumzuia.");
      return;
    }
    const sig = settings.signature ? `\n${settings.signature}` : "";
    const txt = input.trim() + sig;
    setInput("");
    const tmp = { id: `tmp${Date.now()}`, from: "Wewe", text: txt, time: now(), direction: "out" };
    setChats(c => ({ ...c, [active.id]: [...(c[active.id] || []), tmp] }));
    setBusy(true);
    try {
      await sendMessageTo(active.email, active.name, txt);
      setContacts(cs => cs.map(c => c.id === active.id ? { ...c, lastMsg: txt, lastTime: now() } : c));
      showToast(settings.deliveryReports ? "Imetumwa na kupokelewa ✓✓" : "Imetumwa ✓");
    } catch (e) {
      showToast("Imeshindwa ✗ " + e.message);
    }
    setBusy(false);
  }

  async function sendNew() {
    if (!ncEmail.trim() || !ncMsg.trim()) { showToast("Jaza email na ujumbe"); return; }
    const cleanTarget = ncEmail.trim().toLowerCase();
    if (settings.blockedEmails.includes(cleanTarget)) {
      showToast("Barua pepe hii imezuiwa. Iondoe kwenye Mipangilio → Faragha kwanza.");
      return;
    }
    setBusy(true);
    try {
      const sig = settings.signature ? `\n${settings.signature}` : "";
      const finalMsg = ncMsg.trim() + sig;
      const cid = await sendMessageTo(ncEmail.trim(), null, finalMsg);
      const newC = {
        id: cid,
        name: ncEmail.split("@")[0],
        email: cleanTarget,
        lastMsg: finalMsg,
        lastTime: now(),
        unread: 0,
      };
      setContacts(cs => [newC, ...cs.filter(c => c.id !== cid)]);
      setChats(c => ({
        ...c,
        [cid]: [{ id: "tmp0", from: "Wewe", text: finalMsg, time: now(), direction: "out" }],
      }));
      setNcEmail(""); setNcMsg("");
      setActive(newC); setView("chat");
      showToast("Imetumwa ✓");
    } catch (e) {
      showToast("Hitilafu ✗ " + e.message);
    }
    setBusy(false);
  }


  // Polling rahisi: pakua ujumbe upya kila sekunde 6 wakati chat iko wazi
  useEffect(() => {
    if (view === "chat" && active && user) {
      pollRef.current = setInterval(() => { openThread(active); }, 6000);
      return () => clearInterval(pollRef.current);
    }
  }, [view, active?.id, user?.uid]);

  // Polling kimya kwenye inbox: kuonyesha alama za ujumbe mpya bila kubofya Refresh
  useEffect(() => {
    if (view === "inbox" && user) {
      inboxPollRef.current = setInterval(() => { loadThreads(user, true); }, 8000);
      return () => clearInterval(inboxPollRef.current);
    }
  }, [view, user?.uid]);

  const activeChats = active ? (chats[active.id] || []) : [];

  // Orodha ya mazungumzo yanayoonekana - tunaficha yale aliyoyaficha mwenyewe
  // (hiddenChatIds) na yale yenye barua pepe iliyozuiwa (blockedEmails).
  const visibleContacts = contacts.filter(c =>
    !settings.hiddenChatIds.includes(c.id) &&
    !settings.blockedEmails.includes((c.email || "").toLowerCase())
  );

  function toggleHideContact(contact) {
    const isHidden = settings.hiddenChatIds.includes(contact.id);
    const next = isHidden
      ? settings.hiddenChatIds.filter(id => id !== contact.id)
      : [...settings.hiddenChatIds, contact.id];
    updateSettings({ hiddenChatIds: next });
    showToast(isHidden ? `Mazungumzo na ${contact.name} yameonyeshwa tena` : `Mazungumzo na ${contact.name} yamefichwa`);
  }

  // ── Shell ──
  // Kama bado tunaangalia kikao, ruhusu kwa sababu checkingSession itatoa jibu hivi karibuni.
  // VPN screen inaonekana kama appScreen === "vpn"
  if (appScreen === "vpn") {
    return (
      <div style={{ height: "100vh", maxWidth: 480, margin: "0 auto" }}>
        <VpnSimulator onGoToLogin={() => setAppScreen("login")} />
      </div>
    );
  }

  // PIN lock screen - inaonekana juu ya kila kitu kingine kama App Lock imewashwa,
  // na tu wakati mtumiaji bado ameingia (logged in) - sio baada ya logout.
  if (appScreen === "chat" && user && settingsLoaded && appLocked) {
    return (
      <div style={{
        height: "100vh", maxWidth: 480, margin: "0 auto",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        background: S.bg, fontFamily: S.fontFamily, padding: 24
      }}>
        <div style={{
          width: 76, height: 76, borderRadius: 22,
          background: `linear-gradient(135deg,${S.green},${S.greenDark})`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 34, marginBottom: 18, boxShadow: `0 8px 24px ${S.green}55`
        }}>🔒</div>
        <div style={{ fontSize: 18, fontWeight: 800, color: S.text, marginBottom: 6 }}>VPN K Imefungwa</div>
        <div style={{ fontSize: 13, color: S.sub, marginBottom: 22 }}>Weka PIN yako ili kuendelea</div>
        <input
          type="password" inputMode="numeric" maxLength={8} value={pinAttempt}
          onChange={e => { setPinAttempt(e.target.value); setPinError(""); }}
          onKeyDown={e => { if (e.key === "Enter") unlockApp(pinAttempt); }}
          placeholder="••••" autoFocus
          style={{
            width: 160, textAlign: "center", letterSpacing: 8, fontSize: 24,
            padding: "12px 14px", borderRadius: 14, border: `1.5px solid ${S.border}`,
            background: S.white, color: S.text, outline: "none", marginBottom: 12, fontFamily: "inherit"
          }}
        />
        {pinError && <div style={{ color: S.red, fontSize: 12, marginBottom: 10 }}>{pinError}</div>}
        <button onClick={() => unlockApp(pinAttempt)} style={{
          background: S.green, color: "#fff", border: "none",
          padding: "12px 30px", borderRadius: 22, fontSize: 14, fontWeight: 700, cursor: "pointer"
        }}>Fungua</button>
      </div>
    );
  }

  return (
    <div style={{
      height: "100vh", display: "flex", flexDirection: "column",
      background: S.bg, fontFamily: S.fontFamily, fontSize: S.baseFontSize,
      maxWidth: 480, margin: "0 auto", position: "relative",
      boxShadow: "0 0 40px rgba(0,0,0,0.12)", overflow: "hidden"
    }}>

      <HamburgerDrawer
        open={menuOpen}
        onClose={() => setMenuOpen(false)}
        userName={user?.name}
        userEmail={user?.email}
        onOpenSettings={() => setView("settings")}
        onOpenAI={() => setView("ai")}
      />

      {toast && (
        <div style={{
          position: "absolute", top: 68, left: "50%", transform: "translateX(-50%)",
          background: "rgba(0,0,0,0.72)", color: "#fff", padding: "8px 20px",
          borderRadius: 20, fontSize: 13, zIndex: 999, whiteSpace: "nowrap",
          pointerEvents: "none"
        }}>{toast}</div>
      )}

      {/* ═══ INAKAGUA KIKAO KILICHOHIFADHIWA ═══ */}
      {checkingSession && appScreen !== "vpn" && (
        <div style={{
          flex: 1, display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", background: S.bg
        }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>⏳</div>
          <div style={{ fontSize: 13, color: S.sub }}>Inakagua kikao...</div>
        </div>
      )}

      {/* ═══ NOT LOGGED IN ═══ */}
      {(!checkingSession && !user) || appScreen === "login" ? (
        <>
          <div style={{
            background: S.white, padding: "14px 16px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            borderBottom: `1px solid ${S.border}`,
            boxShadow: "0 2px 8px rgba(0,0,0,0.06)", flexShrink: 0
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 20 }}>🛡️</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: S.green }}>VPN K Chat</span>
            </div>
            <button onClick={() => setAppScreen("vpn")} style={{
              background: "none", border: "none", cursor: "pointer",
              fontSize: 13, color: S.sub, display: "flex", alignItems: "center", gap: 4
            }}>← Rudi VPN</button>
          </div>
          <LoginScreen onSubmit={handleAuthSubmit} busy={loginBusy} error={loginError} mode={authMode} setMode={setAuthMode} />
        </>
      ) : null}

      {/* ═══ LOGGED IN ═══ */}
      {!checkingSession && user && appScreen === "chat" && (
        <>
          {/* ── INBOX ── */}
          {view === "inbox" && (
            <>
              <div style={{
                background: S.white, padding: "12px 16px",
                display: "flex", alignItems: "center", justifyContent: "space-between",
                borderBottom: `1px solid ${S.border}`,
                boxShadow: "0 2px 8px rgba(0,0,0,0.06)", flexShrink: 0
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={() => setMenuOpen(true)} style={{
                    background: "none", border: "none", cursor: "pointer",
                    fontSize: 22, padding: "2px 4px", color: S.text,
                    display: "flex", alignItems: "center",
                    borderRadius: 6, transition: "background 0.12s"
                  }} title="Menyu">☰</button>
                  <span style={{ fontSize: 21, fontWeight: 800, color: S.green }}>Messages</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ textAlign: "right", marginRight: 2 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: S.text }}>{user.name.split(" ")[0]}</div>
                    <div style={{ fontSize: 10, color: S.sub }}>{user.email}</div>
                  </div>
                  <div style={{ position: "relative", cursor: "pointer" }} onClick={handleLogout} title="Toka">
                    <Avatar name={user.name} size={36} />
                    <div style={{
                      position: "absolute", bottom: -2, right: -2,
                      background: S.red, borderRadius: "50%",
                      width: 14, height: 14, fontSize: 8,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      color: "#fff", border: `2px solid ${S.white}`
                    }}>✕</div>
                  </div>
                </div>
              </div>

              <div style={{ flex: 1, minHeight: 0, overflowY: "auto", position: "relative" }}>
                {visibleContacts.length === 0 ? (
                  <div style={{ padding: "60px 24px", textAlign: "center" }}>
                    <div style={{ fontSize: 52, marginBottom: 14 }}>📭</div>
                    <div style={{ fontSize: 16, fontWeight: 600, color: S.text, marginBottom: 8 }}>
                      Hakuna mazungumzo bado
                    </div>
                    <div style={{ fontSize: 13, color: S.sub, lineHeight: 1.7 }}>
                      Bonyeza "Anza chat" kutuma ujumbe kwa barua pepe ya mtu
                    </div>
                    <button onClick={() => loadThreads()} disabled={busy} style={{
                      marginTop: 20, background: S.green, color: "#fff", border: "none",
                      padding: "12px 28px", borderRadius: 24, fontSize: 14, fontWeight: 700,
                      cursor: "pointer", boxShadow: "0 3px 10px rgba(38,166,154,0.4)"
                    }}>
                      {busy ? "⏳ Inapakia..." : "🔄 Pakia mazungumzo"}
                    </button>
                  </div>
                ) : (
                  visibleContacts.map(c => (
                    <ContactRow
                      key={c.id}
                      contact={c}
                      isFavorite={settings.favoriteEmails.includes((c.email || "").toLowerCase())}
                      onClick={() => openThread(c)}
                      onLongAction={(contact) => toggleHideContact(contact)}
                    />
                  ))
                )}

                {/* ── Kitufe cha kuelea cha VPN K AI - juu kushoto ya "Anza chat" ── */}
                <button
                  onClick={() => setView("ai")}
                  title="VPN K AI"
                  style={{
                    position: "fixed", left: "max(16px, calc(50% - 232px))", bottom: 78,
                    width: 52, height: 52, borderRadius: "50%",
                    background: `linear-gradient(135deg, ${S.green}, ${S.greenDark})`,
                    border: "none", color: "#fff", fontSize: 22,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    boxShadow: `0 6px 18px ${S.green}66`, cursor: "pointer", zIndex: 50
                  }}
                >🤖</button>
              </div>

              <div style={{
                background: S.white, padding: "10px 20px",
                borderTop: `1px solid ${S.border}`,
                display: "flex", justifyContent: "flex-end", gap: 10,
                flexShrink: 0
              }}>
                {visibleContacts.length > 0 && (
                  <button onClick={() => loadThreads()} disabled={busy} style={{
                    background: "transparent", color: S.green,
                    border: `1.5px solid ${S.green}`,
                    padding: "8px 16px", borderRadius: 20,
                    fontSize: 13, fontWeight: 600, cursor: "pointer"
                  }}>🔄 Refresh</button>
                )}
                <button onClick={() => setView("newChat")} style={{
                  background: S.green, color: "#fff", border: "none",
                  padding: "10px 20px", borderRadius: 24,
                  fontSize: 14, fontWeight: 700, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 8,
                  boxShadow: "0 4px 14px rgba(38,166,154,0.4)"
                }}>✏️ Anza chat</button>
              </div>
            </>
          )}

          {/* ── CHAT ── */}
          {view === "chat" && active && (
            <>
              <div style={{
                background: S.white, padding: "12px 16px",
                display: "flex", alignItems: "center", gap: 12,
                borderBottom: `1px solid ${S.border}`,
                boxShadow: "0 2px 6px rgba(0,0,0,0.06)", flexShrink: 0
              }}>
                <button onClick={() => { setView("inbox"); loadThreads(); }} style={{
                  background: "none", border: "none", cursor: "pointer", fontSize: 20, color: S.green
                }}>←</button>
                <Avatar name={active.name} size={40} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: S.text }}>{active.name}</div>
                  <div style={{ fontSize: 11, color: S.sub }}>{active.email}</div>
                </div>
                <button onClick={() => openThread(active)} style={{
                  background: "none", border: "none", cursor: "pointer", fontSize: 18, color: S.sub
                }} title="Reload">🔄</button>
              </div>

              <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "10px 0", background: S.chatBg }}>
                {busy && activeChats.length === 0 ? (
                  <div style={{ textAlign: "center", padding: 40, color: S.sub }}>
                    <div style={{ fontSize: 28, marginBottom: 8 }}>⏳</div>Inapakia...
                  </div>
                ) : activeChats.length === 0 ? (
                  <div style={{ textAlign: "center", padding: 50, color: S.sub }}>
                    <div style={{ fontSize: 44, marginBottom: 10 }}>✉️</div>
                    <div>Hakuna ujumbe bado</div>
                    <div style={{ fontSize: 12, marginTop: 4 }}>Tuma ujumbe wa kwanza</div>
                  </div>
                ) : (
                  activeChats.map(msg => <Bubble key={msg.id} msg={msg} ttsEnabled={settings.ttsEnabled} />)
                )}
                <div ref={endRef} />
              </div>

              {settings.quickReplies && settings.quickReplies.length > 0 && (
                <div style={{
                  display: "flex", gap: 8, padding: "8px 12px 0",
                  overflowX: "auto", flexShrink: 0, background: S.white
                }}>
                  {settings.quickReplies.map((qr, i) => (
                    <button key={i} onClick={() => setInput(prev => prev ? prev + " " + qr : qr)}
                      style={{
                        flexShrink: 0, background: S.input, border: `1px solid ${S.border}`,
                        color: S.text, borderRadius: 16, padding: "6px 13px",
                        fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap"
                      }}>{qr}</button>
                  ))}
                </div>
              )}

              <div style={{
                background: S.white, padding: "10px 12px",
                display: "flex", flexDirection: "column", gap: 4,
                borderTop: `1px solid ${S.border}`, flexShrink: 0
              }}>
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                  <textarea value={input} onChange={e => setInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendReply(); } }}
                    placeholder={`Ujumbe kwa ${active.name}...`} rows={1}
                    style={{
                      flex: 1, background: S.input, border: "none",
                      borderRadius: 20, padding: "10px 16px", fontSize: S.baseFontSize + 1,
                      color: S.text, resize: "none", outline: "none",
                      fontFamily: "inherit", lineHeight: 1.5, maxHeight: 100, overflowY: "auto"
                    }} />
                  <button onClick={sendReply} disabled={!input.trim() || busy} style={{
                    background: input.trim() ? S.green : "#ccc", border: "none",
                    color: "#fff", width: 42, height: 42, borderRadius: "50%",
                    cursor: input.trim() ? "pointer" : "default", fontSize: 18,
                    flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                    boxShadow: input.trim() ? `0 2px 8px ${S.green}66` : "none",
                    transition: "all 0.2s"
                  }}>{busy ? "⏳" : "➤"}</button>
                </div>
                {settings.showCharCounter && (
                  <div style={{ textAlign: "right", fontSize: 10.5, color: S.sub, paddingRight: 4 }}>
                    {input.length} herufi
                  </div>
                )}
              </div>
            </>
          )}

          {/* ── NEW CHAT ── */}
          {view === "newChat" && (
            <>
              <div style={{
                background: S.white, padding: "14px 16px",
                display: "flex", alignItems: "center", gap: 12,
                borderBottom: `1px solid ${S.border}`,
                boxShadow: "0 2px 6px rgba(0,0,0,0.06)", flexShrink: 0
              }}>
                <button onClick={() => setView("inbox")} style={{
                  background: "none", border: "none", cursor: "pointer", fontSize: 20, color: S.green
                }}>←</button>
                <span style={{ fontSize: 18, fontWeight: 700, color: S.text }}>Ujumbe Mpya</span>
              </div>

              <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "20px 16px", background: S.bg }}>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: S.sub, marginBottom: 5, fontWeight: 600 }}>Barua pepe ya mtu *</div>
                  <input type="email" value={ncEmail} onChange={e => setNcEmail(e.target.value)} placeholder="mfano@gmail.com"
                    style={{
                      width: "100%", background: S.white, border: `1.5px solid ${S.border}`,
                      borderRadius: 12, padding: "11px 14px", fontSize: 16,
                      color: S.text, boxSizing: "border-box", outline: "none", fontFamily: "inherit"
                    }}
                    onFocus={e => e.target.style.borderColor = S.green}
                    onBlur={e => e.target.style.borderColor = S.border}
                  />
                  <div style={{ fontSize: 11, color: S.sub, marginTop: 6 }}>
                    Mtu huyu lazima awe tayari amejisajili kwenye VPN K.
                  </div>
                </div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 12, color: S.sub, marginBottom: 5, fontWeight: 600 }}>Ujumbe *</div>
                  <textarea value={ncMsg} onChange={e => setNcMsg(e.target.value)}
                    placeholder="Andika ujumbe wako hapa..." rows={5}
                    style={{
                      width: "100%", background: S.white, border: `1.5px solid ${S.border}`,
                      borderRadius: 12, padding: "11px 14px", fontSize: 16,
                      color: S.text, boxSizing: "border-box", outline: "none",
                      fontFamily: "inherit", resize: "vertical"
                    }}
                    onFocus={e => e.target.style.borderColor = S.green}
                    onBlur={e => e.target.style.borderColor = S.border}
                  />
                  {settings.showCharCounter && (
                    <div style={{ textAlign: "right", fontSize: 11, color: S.sub, marginTop: 4 }}>
                      {ncMsg.length} herufi
                    </div>
                  )}
                </div>
                <button onClick={sendNew} disabled={busy || !ncEmail.trim() || !ncMsg.trim()} style={{
                  width: "100%",
                  background: (ncEmail && ncMsg) ? S.green : "#ccc",
                  color: "#fff", border: "none", padding: "14px",
                  borderRadius: 24, fontSize: 16, fontWeight: 700,
                  cursor: (ncEmail && ncMsg) ? "pointer" : "default",
                  boxShadow: (ncEmail && ncMsg) ? "0 4px 14px rgba(38,166,154,0.4)" : "none",
                  transition: "all 0.2s"
                }}>
                  {busy ? "⏳ Inatuma..." : "✉️ Tuma Ujumbe"}
                </button>
              </div>
            </>
          )}

          {/* ══════════════════════ MIPANGILIO (SETTINGS) ══════════════════════ */}
          {view === "settings" && (
            <SettingsScreen
              settings={settings}
              updateSettings={updateSettings}
              onBack={() => setView("inbox")}
              showToast={showToast}
              user={user}
            />
          )}

          {/* ══════════════════════ VPN K AI ══════════════════════ */}
          {view === "ai" && (
            <VpnkAIScreen onBack={() => setView("inbox")} settings={settings} />
          )}
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
